<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OwlPulse OG Template</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            width: 1200px; height: 630px;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }
        .bg-pattern {
            position: absolute; inset: 0;
            background-image: radial-gradient(circle at 20% 80%, rgba(249,115,22,0.15) 0%, transparent 50%),
                              radial-gradient(circle at 80% 20%, rgba(249,115,22,0.1) 0%, transparent 40%);
        }
        .content { position: relative; z-index: 1; text-align: center; padding: 40px; }
        .logo { font-size: 48px; margin-bottom: 24px; }
        h1 { 
            font-size: 64px; font-weight: 800; color: #f8fafc; 
            line-height: 1.1; margin-bottom: 24px;
        }
        h1 span { color: #f97316; }
        p { font-size: 28px; color: #94a3b8; margin-bottom: 32px; }
        .badge {
            display: inline-block; padding: 8px 16px;
            background: rgba(249,115,22,0.2); color: #f97316;
            border-radius: 20px; font-size: 18px; font-weight: 600;
        }
        .pulse {
            position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px;
        }
        .pulse span {
            width: 12px; height: 12px; background: #f97316; border-radius: 50%;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .pulse span:nth-child(2) { animation-delay: 0.2s; }
        .pulse span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="content">
        <div class="logo">🦉</div>
        <h1>{{title}}</h1>
        <p>{{subtitle}}</p>
        <span class="badge">owlpulse.org</span>
    </div>
    <div class="pulse">
        <span></span><span></span><span></span>
    </div>
</body>
</html>
